<polyline data-name="Xingu" class="rio-line" points="258.5,239.4 264.6,193.0 276.9,131.3"/>
<polyline data-name="Tapajós" class="rio-line" points="203.1,239.4 221.5,200.8 233.8,146.7 240.0,123.5"/>
