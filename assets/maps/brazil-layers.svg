  </g>

  <!-- ── Camada: Rodovias ───────────────────────── -->
  <g data-layer="rodovias" class="map-layer-hidden">
    <polyline data-name="BR-101" class="rod-line" points="455.4,3.1 480.0,208.5 436.9,285.7 412.3,424.7 379.1,438.6 313.8,486.5 280.6,548.2 270.8,610.0"/>
<polyline data-name="BR-116" class="rod-line" points="436.9,142.1 418.5,285.7 375.4,393.8 337.2,447.8 304.0,477.2 280.6,548.2"/>
<polyline data-name="BR-364" class="rod-line" points="321.2,328.9 238.8,400.0 172.3,239.4 124.3,220.8 76.3,237.8"/>
<polyline data-name="BR-230" class="rod-line" points="313.8,108.1 233.8,177.6 124.3,220.8"/>
  </g>

  <!-- ── Camada: Desmatamento ───────────────────── -->
  <g data-layer="desmatamento" class="map-layer-hidden">
    <path fill="#d40000" opacity=".45" stroke="#d40000" stroke-width=".8" d="M 196.9,208.5 233.8,208.5 246.2,254.8 221.5,285.7 190.8,254.8 Z"/>
<path fill="#d40000" opacity=".45" stroke="#d40000" stroke-width=".8" d="M 246.2,177.6 283.1,208.5 289.2,247.1 258.5,223.9 Z"/>
<path fill="#d40000" opacity=".45" stroke="#d40000" stroke-width=".8" d="M 129.2,208.5 172.3,208.5 166.2,254.8 135.4,254.8 Z"/>
    <!-- Legenda interna da camada -->
    <rect x="18" y="18" width="120" height="20" rx="3"
          fill="rgba(242,237,227,.9)" stroke="#d40000" stroke-width="1"/>
    <rect x="24" y="24" width="10" height="8" fill="#d40000" opacity=".45"/>
    <text x="40" y="31" font-family="monospace" font-size="8" fill="#d40000">
      Área desmatada
    </text>
  </g>

  <!-- Rosa dos ventos -->
  <g transform="translate(500,555)">
    <circle r="26" fill="rgba(242,237,227,.9)" stroke="#c8bfa8" stroke-width="1"/>
    <polygon points="0,-19 -4,-5 4,-5" fill="#c4a35a"/>
    <polygon points="0,19 -4,5 4,5"   fill="#1e3a5f" opacity=".55"/>
    <line x1="-19" y1="0" x2="19" y2="0" stroke="#1e3a5f" stroke-width="1" opacity=".4"/>
    <text text-anchor="middle" y="-21" font-family="monospace" font-size="9"
          font-weight="700" fill="#c4a35a">N</text>
  </g>
</svg>
