<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 610"
     role="img" aria-label="Mapa do Brasil com camadas temáticas">
  <title>Brasil — Camadas Temáticas</title>
  <desc>Mapa interativo com camadas: biomas, cidades, rios, rodovias e desmatamento.</desc>
  <defs>
    <style>
      .map-layer-hidden { display:none; }
      .city-dot { fill:#e05a00; stroke:#f2ede3; stroke-width:.8; cursor:pointer;
                   transition:r .1s; }
      .city-dot:hover { r:6; }
      .city-label { font-family:"DM Mono",monospace; font-size:7px; fill:#1e3a5f;
                     pointer-events:none; }
      .rio-line { fill:none; stroke:#3a80a0; stroke-width:1.4;
                   stroke-linecap:round; stroke-linejoin:round; }
      .rod-line { fill:none; stroke:#8b5e2e; stroke-width:1; stroke-dasharray:5,3;
                   stroke-linecap:round; stroke-linejoin:round; }
      .graticule { stroke:rgba(30,58,95,.1); stroke-width:.5; fill:none; stroke-dasharray:3,5; }
    </style>
  </defs>

  <!-- Oceano -->
  <rect width="560" height="610" fill="#8dbdd1"/>

  <!-- Graticule -->
  <line class="graticule" x1="0" y1="84.9" x2="560" y2="84.9"/>
  <line class="graticule" x1="0" y1="446.3" x2="560" y2="446.3"/>

  <!-- Contorno do país -->
  <path fill="#e8dfc8" stroke="#8b7d68" stroke-width="1"
        d="M 1.2,46.3 43.1,3.1 166.2,3.1 276.9,23.2 338.5,61.8 369.2,38.6 455.4,3.1 482.5,92.7 482.5,270.3 449.2,308.9 424.6,362.9 400.0,409.2 418.5,432.4 400.0,478.7 313.8,532.8 270.8,610.0 203.1,571.4 240.0,494.2 203.1,393.8 166.2,316.6 73.8,285.7 104.6,223.9 1.2,162.2 Z"/>

  <!-- ── Camada: Biomas ─────────────────────────── -->
  <g data-layer="biomas">
    <path data-name="Amazônia" fill="#2d6b2d" opacity=".85" stroke="none" d="M 1.2,46.3 43.1,3.1 166.2,3.1 276.9,23.2 338.5,61.8 338.5,278.0 295.4,247.1 246.2,177.6 172.3,169.9 104.6,223.9 1.2,162.2 Z"/>
<path data-name="Cerrado" fill="#a09040" opacity=".85" stroke="none" d="M 172.3,169.9 246.2,177.6 295.4,247.1 338.5,278.0 363.1,316.6 332.3,401.5 289.2,463.3 240.0,494.2 203.1,393.8 166.2,316.6 104.6,223.9 Z"/>
<path data-name="Caatinga" fill="#c4905a" opacity=".85" stroke="none" d="M 338.5,278.0 363.1,316.6 363.1,378.4 424.6,362.9 482.5,270.3 482.5,92.7 455.4,3.1 369.2,38.6 338.5,61.8 Z"/>
<path data-name="Mata Atlântica" fill="#3a7a3a" opacity=".85" stroke="none" d="M 363.1,316.6 363.1,378.4 400.0,409.2 418.5,432.4 400.0,478.7 289.2,463.3 332.3,401.5 Z"/>
<path data-name="Pampa" fill="#7aaa5a" opacity=".85" stroke="none" d="M 289.2,463.3 400.0,478.7 313.8,532.8 270.8,610.0 203.1,571.4 240.0,494.2 Z"/>
<path data-name="Pantanal" fill="#5a8a7a" opacity=".85" stroke="none" d="M 203.1,393.8 240.0,332.0 196.9,332.0 166.2,362.9 166.2,424.7 203.1,424.7 Z"/>
  </g>

  <!-- ── Camada: Cidades ────────────────────────── -->
