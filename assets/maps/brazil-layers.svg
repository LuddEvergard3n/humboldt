<text x="443.9" y="146.1" class="city-label">Fortaleza</text>
<circle cx="384.0" cy="163.7" r="4" class="city-dot" data-name="Teresina"/>
<text x="391.0" y="167.7" class="city-label">Teresina</text>
<circle cx="477.5" cy="174.5" r="4" class="city-dot" data-name="Natal"/>
<text x="484.5" y="178.5" class="city-label">Natal</text>
<circle cx="481.2" cy="194.6" r="4" class="city-dot" data-name="João Pessoa"/>
<text x="488.2" y="198.6" class="city-label">João Pessoa</text>
<circle cx="480.0" cy="210.0" r="4" class="city-dot" data-name="Recife"/>
<text x="487.0" y="214.0" class="city-label">Recife</text>
<circle cx="471.4" cy="234.7" r="4" class="city-dot" data-name="Maceió"/>
<text x="478.4" y="238.7" class="city-label">Maceió</text>
<circle cx="454.2" cy="253.3" r="4" class="city-dot" data-name="Aracaju"/>
<text x="461.2" y="257.3" class="city-label">Aracaju</text>
<circle cx="436.9" cy="285.7" r="4" class="city-dot" data-name="Salvador"/>
<text x="443.9" y="289.7" class="city-label">Salvador</text>
<circle cx="321.2" cy="328.9" r="6" class="city-dot" data-name="Brasília"/>
<text x="328.2" y="332.9" class="city-label">Brasília</text>
<circle cx="304.0" cy="342.8" r="4" class="city-dot" data-name="Goiânia"/>
