<text x="287.6" y="552.2" class="city-label">Porto Alegre</text>
  </g>

  <!-- ── Camada: Rios ───────────────────────────── -->
  <g data-layer="rios" class="map-layer-hidden">
    <polyline data-name="Amazonas" class="rio-line" points="6.2,131.3 49.2,134.4 110.8,131.3 172.3,132.8 233.8,115.8 270.8,112.7 313.8,108.1"/>
<polyline data-name="Solimões" class="rio-line" points="6.2,131.3 49.2,134.4 110.8,131.3 166.2,137.4"/>
<polyline data-name="Negro" class="rio-line" points="110.8,108.1 141.5,112.7 172.3,132.8"/>
<polyline data-name="Tocantins" class="rio-line" points="320.0,285.7 316.3,242.5 317.5,177.6 313.8,108.1"/>
<polyline data-name="São Francisco" class="rio-line" points="332.3,308.9 381.5,362.9 412.3,316.6 443.1,262.5 461.5,247.1"/>
<polyline data-name="Paraná" class="rio-line" points="283.1,347.5 240.0,424.7 203.1,486.5 203.1,548.2"/>
