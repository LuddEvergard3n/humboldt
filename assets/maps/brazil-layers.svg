<circle cx="369.2" cy="392.3" r="4" class="city-dot" data-name="Belo Horizonte"/>
<text x="376.2" y="396.3" class="city-label">Belo Horizonte</text>
<circle cx="414.8" cy="398.4" r="4" class="city-dot" data-name="Vitória"/>
<text x="421.8" y="402.4" class="city-label">Vitória</text>
<circle cx="379.1" cy="438.6" r="4" class="city-dot" data-name="Rio de Janeiro"/>
<text x="386.1" y="442.6" class="city-label">Rio de Janeiro</text>
<circle cx="337.2" cy="447.8" r="4" class="city-dot" data-name="São Paulo"/>
<text x="344.2" y="451.8" class="city-label">São Paulo</text>
<circle cx="304.0" cy="477.2" r="4" class="city-dot" data-name="Curitiba"/>
