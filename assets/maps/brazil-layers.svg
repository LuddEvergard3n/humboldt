<text x="179.3" y="136.8" class="city-label">Manaus</text>
<circle cx="313.8" cy="108.1" r="4" class="city-dot" data-name="Belém"/>
<text x="320.8" y="112.1" class="city-label">Belém</text>
<circle cx="283.1" cy="84.9" r="4" class="city-dot" data-name="Macapá"/>
<text x="290.1" y="88.9" class="city-label">Macapá</text>
