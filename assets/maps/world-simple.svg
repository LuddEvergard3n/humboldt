  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 462"
       role="img" aria-label="Mapa mundial simplificado">
    <title>Mapa Mundial Simplificado</title>
    <desc>Regiões mundiais simplificadas: Américas, Europa, África, Oriente Médio, Rússia, Ásia e Oceania.</desc>
    <defs>
      <style>
        .region { stroke:#c8bfa8; stroke-width:.8; cursor:pointer;
                   transition:opacity .15s,filter .15s; }
        .region:hover,.region:focus { opacity:.75; filter:brightness(1.12); outline:none; }
        .region:focus-visible { outline:2px solid #c4a35a; outline-offset:2px; }
        .rlabel { font-family:"DM Mono",monospace; font-size:8px; font-weight:600;
                   fill:rgba(30,58,95,.8); text-anchor:middle; pointer-events:none; }
        .graticule { stroke:rgba(30,58,95,.15); stroke-width:.5; fill:none; }
      </style>
    </defs>

    <!-- Oceano -->
    <rect width="900" height="462" fill="#8dbdd1"/>

    <path class="region" data-id="america-norte" data-name="América do Norte"
      fill="#c8b878" d="M 30.0,46.8 312.5,15.6 320.0,128.0 250.0,193.5 230.0,224.8 232.5,243.5 255.0,246.6 187.5,212.3 157.5,171.7 137.5,121.7 105.0,87.4 30.0,81.2 Z"
      tabindex="0" role="button" aria-label="América do Norte"/>
<path class="region" data-id="america-sul" data-name="América do Sul"
      fill="#bca860" d="M 250.0,237.2 300.0,237.2 362.5,290.3 365.0,315.3 355.0,352.7 325.0,384.0 280.0,449.5 262.5,437.0 250.0,384.0 250.0,274.7 Z"
      tabindex="0" role="button" aria-label="América do Sul"/>
<path class="region" data-id="europa" data-name="Europa"
      fill="#98afc0" d="M 387.5,49.9 545.0,49.9 550.0,131.1 540.0,162.3 512.5,162.3 487.5,159.2 437.5,162.3 425.0,156.1 395.0,124.9 425.0,109.3 390.0,71.8 Z"
      tabindex="0" role="button" aria-label="Europa"/>
<path class="region" data-id="africa" data-name="África"
      fill="#c4a050" d="M 405.0,159.2 542.5,159.2 587.5,237.2 580.0,274.7 555.0,312.2 535.0,337.1 492.5,384.0 450.0,384.0 405.0,337.1 405.0,237.2 Z"
      tabindex="0" role="button" aria-label="África"/>
<path class="region" data-id="oriente-medio" data-name="Oriente Médio"
      fill="#d8b864" d="M 540.0,156.1 550.0,143.6 605.0,143.6 612.5,162.3 605.0,206.0 590.0,231.0 560.0,237.2 530.0,206.0 530.0,181.1 515.0,177.9 525.0,156.1 Z"
      tabindex="0" role="button" aria-label="Oriente Médio"/>
<path class="region" data-id="russia" data-name="Rússia / Ásia Central"
      fill="#aabba0" d="M 545.0,49.9 900.0,49.9 900.0,118.6 812.5,143.6 700.0,118.6 605.0,118.6 550.0,131.1 545.0,103.0 545.0,49.9 Z"
      tabindex="0" role="button" aria-label="Rússia / Ásia Central"/>
<path class="region" data-id="asia-meridional" data-name="Ásia Meridional"
      fill="#ccb070" d="M 605.0,159.2 650.0,156.1 695.0,187.3 700.0,249.7 650.0,274.7 625.0,249.7 615.0,206.0 605.0,187.3 590.0,193.5 590.0,231.0 605.0,206.0 Z"
      tabindex="0" role="button" aria-label="Ásia Meridional"/>
<path class="region" data-id="asia-oriental" data-name="Ásia Oriental"
      fill="#a0c09a" d="M 700.0,118.6 812.5,103.0 812.5,168.6 755.0,206.0 700.0,212.3 695.0,187.3 700.0,118.6 Z"
      tabindex="0" role="button" aria-label="Ásia Oriental"/>
<path class="region" data-id="sudeste-asiatico" data-name="Sudeste Asiático"
      fill="#b0b878" d="M 695.0,187.3 755.0,206.0 750.0,259.1 712.5,274.7 700.0,249.7 Z"
      tabindex="0" role="button" aria-label="Sudeste Asiático"/>
<path class="region" data-id="oceania" data-name="Oceania"
      fill="#c0ae8a" d="M 730.0,324.6 837.5,324.6 837.5,415.2 812.5,430.8 737.5,399.6 730.0,374.6 Z"
      tabindex="0" role="button" aria-label="Oceania"/>

<text class="rlabel" x="187.3" y="147.8">AMÉRICA DO N</text>
<text class="rlabel" x="300.0" y="336.2">AMÉRICA DO S</text>
<text class="rlabel" x="463.2" y="121.7">EUROPA</text>
<text class="rlabel" x="495.8" y="282.2">ÁFRICA</text>
<text class="rlabel" x="560.2" y="181.9">ORIENTE MÉDI</text>
<text class="rlabel" x="678.1" y="98.2">RÚSSIA / ÁSI</text>
<text class="rlabel" x="630.0" y="209.1">ÁSIA MERIDIO</text>
<text class="rlabel" x="739.3" y="159.2">ÁSIA ORIENTA</text>
<text class="rlabel" x="780.8" y="378.2">OCEANIA</text>

<line class="graticule" x1="0" y1="274.7" x2="900" y2="274.7" stroke-dasharray="4,4"/>
<text x="5" y="271.7" font-family="monospace" font-size="7" fill="rgba(30,58,95,.45)">Equador</text>
<line class="graticule" x1="0" y1="347.7" x2="900" y2="347.7" stroke-dasharray="2,6"/>
<text x="5" y="344.7" font-family="monospace" font-size="7" fill="rgba(30,58,95,.45)">Trp. Capricórnio</text>
<line class="graticule" x1="0" y1="201.7" x2="900" y2="201.7" stroke-dasharray="2,6"/>
<text x="5" y="198.7" font-family="monospace" font-size="7" fill="rgba(30,58,95,.45)">Trp. Câncer</text>
<line class="graticule" x1="0" y1="67.1" x2="900" y2="67.1" stroke-dasharray="1,8"/>

    <!-- Rosa dos ventos -->
    <g transform="translate(855,420)">
      <circle r="22" fill="rgba(242,237,227,.9)" stroke="#c8bfa8" stroke-width="1"/>
      <polygon points="0,-16 -3,-4 3,-4" fill="#c4a35a"/>
      <polygon points="0,16 -3,4 3,4"   fill="#1e3a5f" opacity=".5"/>
      <text text-anchor="middle" y="-18" font-family="monospace" font-size="8"
            font-weight="700" fill="#c4a35a">N</text>
    </g>
  </svg>
